{{ define "main" }}
  <main id="cyber-main">
    <div id="cyber-welcome"></div>
  </main>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: #0f172a;
      overflow: auto;
    }
    main#cyber-main {
      width: 100%;
      min-width: 0;
      position: relative;
      box-sizing: border-box;
    }
    #cyber-welcome {
      position: relative;
      color: #00ffe7;
      font-size: 3vw;
      text-shadow: 0 0 20px #00ffe7, 0 0 40px #00e1ff;
      letter-spacing: 0.2em;
      animation: flicker 2s infinite alternate;
      z-index: 10;
      margin: 0 auto;
      max-width: 90vw;
      min-width: 200px;
      text-align: center;
      white-space: pre-line;
      word-break: break-all;
    }
    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.7; text-shadow: 0 0 30px #00e1ff, 0 0 60px #ffaec9; }
      100% { opacity: 1; }
    }
  </style>
<script>
  // 动态赛博朋克欢迎语
  const texts = [
    '欢迎来到AJUNE的个人空间',
    '你好，世界！'
  ];
  let idx = 0;
  const el = document.getElementById('cyber-welcome');
  function typeText(text, i = 0) {
    if (i <= text.length) {
      el.innerHTML = text.slice(0, i) + '<span style="opacity:0.5;">▋</span>';
      setTimeout(() => typeText(text, i + 1), 80 + Math.random() * 40);
    } else {
      setTimeout(() => eraseText(text), 1200);
    }
  }
  function eraseText(text, i = text.length) {
    if (i >= 0) {
      el.innerHTML = text.slice(0, i) + '<span style="opacity:0.5;">▋</span>';
      setTimeout(() => eraseText(text, i - 1), 30 + Math.random() * 30);
    } else {
      idx = (idx + 1) % texts.length;
      setTimeout(() => typeText(texts[idx]), 400);
    }
  }
  typeText(texts[idx]);
</script>
{{ end }}
