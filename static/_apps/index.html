<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>在线案例导航</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 0; padding: 40px; color: #e2e8f0; min-height: 100vh; position: relative; overflow-x: hidden; background: radial-gradient(1200px 800px at 10% 10%, rgba(14, 165, 233, .25) 0%, transparent 60%), radial-gradient(1000px 700px at 90% 20%, rgba(217, 70, 239, .25) 0%, transparent 55%), #06060f; }
      body::before,
      body::after { content: ""; position: fixed; inset: -20vmax; z-index: -1; filter: blur(60px); opacity: .6; animation: float 16s ease-in-out infinite; }
      body::before { background: radial-gradient(40% 40% at 30% 30%, rgba(99,102,241,.45), transparent 60%), radial-gradient(35% 35% at 70% 60%, rgba(56,189,248,.35), transparent 60%); }
      body::after { background: radial-gradient(35% 35% at 20% 70%, rgba(244,114,182,.35), transparent 60%), radial-gradient(40% 40% at 80% 30%, rgba(34,211,238,.35), transparent 60%); animation-delay: -6s; }
      .stars,
      .stars::after { position: fixed; inset: 0; content: ""; background-image: radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.45), transparent 40%),
          radial-gradient(1.5px 1.5px at 120px 80px, rgba(255,255,255,.35), transparent 40%),
          radial-gradient(1.2px 1.2px at 200px 150px, rgba(255,255,255,.3), transparent 40%),
          radial-gradient(2px 2px at 260px 40px, rgba(255,255,255,.25), transparent 40%),
          radial-gradient(1.3px 1.3px at 360px 120px, rgba(255,255,255,.3), transparent 40%),
          radial-gradient(1.8px 1.8px at 420px 200px, rgba(255,255,255,.4), transparent 40%);
        background-size: 500px 300px; opacity: .4; z-index: -1; animation: drift 40s linear infinite; }
      .stars::after { opacity: .2; filter: blur(1px); animation-duration: 70s; }
      .gridflow { position: fixed; inset: -20vh -20vw; z-index: -1; background-image: linear-gradient(rgba(34, 211, 238, .25) 1px, transparent 1px), linear-gradient(90deg, rgba(217, 70, 239, .25) 1px, transparent 1px); background-size: 60px 60px; transform: perspective(900px) rotateX(70deg); animation: gridmove 14s linear infinite; opacity: .35; }
      .scanlines { position: fixed; inset: 0; pointer-events: none; z-index: -1; background: repeating-linear-gradient( to bottom, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px ); mix-blend-mode: screen; opacity: .25; }
      .glow { position: fixed; inset: -20%; z-index: -1; background: conic-gradient(from 180deg, rgba(34,211,238,.25), rgba(217,70,239,.25), rgba(99,102,241,.25), rgba(34,211,238,.25)); filter: blur(80px); opacity: .35; animation: spin 20s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes drift { from { transform: translate3d(0,0,0); } to { transform: translate3d(-300px, -200px, 0); } }
      @keyframes gridmove { from { background-position: 0 0; } to { background-position: 0 -240px; } }
      @keyframes float { 0%, 100% { transform: translate3d(0,0,0) rotate(0deg); } 50% { transform: translate3d(4%, -3%, 0) rotate(6deg); } }
      h1 { margin: 0; font-size: 28px; }
      .header-row { display: flex; align-items: center; gap: 12px; margin: 0 0 16px; }
      p { margin: 0 0 24px; color: #cbd5f5; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
      .back-home { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: #93c5fd; font-size: 14px; }
      .back-home:hover { color: #e879f9; text-shadow: 0 0 12px rgba(232,121,249,.4); }
      a.card { display: block; background: rgba(10, 12, 24, .8); border: 1px solid rgba(34, 211, 238, .35); border-radius: 12px; text-decoration: none; color: #e2e8f0; overflow: hidden; transform: translateY(0); transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease; backdrop-filter: blur(8px); position: relative; }
      a.card::after { content: ""; position: absolute; inset: -40% 0; background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,.08) 40%, transparent 70%); transform: translateX(-100%); transition: transform .6s ease; }
      a.card:hover::after { transform: translateX(100%); }
      a.card:hover { border-color: #6366f1; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,.35); }
      .thumb { width: 100%; height: auto; aspect-ratio: 1.618 / 1; object-fit: cover; display: block; }
      .card-body { padding: 12px 16px 16px; }
      .title { font-size: 16px; font-weight: 600; }
      .tag { display: inline-block; font-size: 12px; color: #94a3b8; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="stars"></div>
    <div class="gridflow"></div>
    <div class="scanlines"></div>
    <div class="header-row">
      <h1>在线案例导航</h1>
      <a class="back-home" href="/">← 回到主页</a>
    </div>
    <p>这里汇总静态 WebApp 示例，点击进入。</p>
    <div class="grid">
      <a class="card" href="/_webapps/jnes/index.html">
        <img class="thumb" src="./images/jnes.png" alt="jnes 预览" />
        <div class="card-body">
          <div class="title">jnes</div>
          <span class="tag">静态</span>
        </div>
      </a>
      <a class="card" href="/_webapps/webocc/index.html">
        <img class="thumb" src="./images/webocc.png" alt="webocc 预览" />
        <div class="card-body">
          <div class="title">webocc</div>
          <span class="tag">静态</span>
        </div>
      </a>
      <a class="card" href="/_webapps/webshape/index.html">
        <img class="thumb" src="./images/webshape.png" alt="webshape 预览" />
        <div class="card-body">
          <div class="title">webshape</div>
          <span class="tag">静态</span>
        </div>
      </a>
    </div>
  </body>
</html>
