<!doctype html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="./game.svg" type="image/x-icon">
	<style>
		* {
			margin: 0;
			padding: 0
		}

		body {
			font-family: Arial, sans-serif;
			background: #0f0f17;
			color: #f5f5f5;
		}

		#wrap {
			width: 100%;
			margin: 0 auto;
		}

		#header {
			/* margin:20px;   */
			/* height: 80px; */
			/* border: solid 1px #0000FF; */
		}

		#container {
			position: relative;
			margin-top: 20px;
			height: 400px;
		}

		#screen-wrap {
			display: flex;
			justify-content: center;
		}

		#nes-canvas {
			width: 95%;
			max-width: 720px;
			height: auto;
			image-rendering: pixelated;
		}

		#left_side {
			position: absolute;
			top: 0px;
			left: 0px;
			/* border: solid 1px #0000FF; */
			width: 170px;
			/* height: 100%; */
		}

		#content {
			margin: 0px 190px 0px 190px;
			/* border: solid 1px #0000FF; */
			height: 100%;
		}

		#right_side {
			position: absolute;
			top: 0px;
			right: 0px;
			/* border: solid 1px #0000FF; */
			width: 170px;
			/* height: 100%; */
		}

		#footer {
			margin-top: 20px;
			/* height: 80px; */
			/* border: solid 1px #0000FF; */
		}

		#touch-controls {
			position: fixed;
			left: 0;
			right: 0;
			bottom: 0;
			padding: 16px;
			box-sizing: border-box;
			display: none;
			justify-content: space-between;
			align-items: center;
			background: none;
			backdrop-filter: none;
			z-index: 10;
			gap: 20px;
		}

		.touch-cluster {
			position: relative;
			width: 220px;
			height: 220px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.dpad-bg {
			position: absolute;
			width: 220px;
			height: 220px;
			border-radius: 50%;
			background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
			box-shadow: inset 0 8px 20px rgba(0, 0, 0, 0.45), 0 8px 20px rgba(0, 0, 0, 0.35);
		}

		.dpad {
			position: relative;
			width: 192px;
			height: 192px;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			grid-template-rows: repeat(3, 1fr);
			gap: 8px;
		}

		.touch-btn {
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.2);
			color: #f5f5f5;
			border-radius: 14px;
			font-size: 18px;
			font-weight: 600;
			text-align: center;
			user-select: none;
			touch-action: manipulation;
			box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
		}

		.touch-btn:active {
			background: rgba(255, 255, 255, 0.18);
		}

		.touch-btn.wide {
			min-width: 90px;
			padding: 12px 16px;
			margin-left: 10px;
		}

		.dpad .touch-btn {
			border-radius: 14px;
			font-size: 18px;
			height: 58px;
			width: 58px;
		}

		.center-buttons {
			display: flex;
			flex-direction: row;
			gap: 12px;
			align-items: center;
		}

		.ab-cluster {
			display: flex;
			gap: 18px;
			align-items: center;
		}

		.touch-btn.ab {
			width: 84px;
			height: 84px;
			border-radius: 50%;
			font-size: 22px;
		}

		@media (max-width: 960px) {
			#container {
				height: auto;
				padding-bottom: 260px;
			}

			#left_side,
			#right_side {
				display: none;
			}

			#touch-controls {
				display: flex;
			}
		}
	</style>
	<title>NES GAMES</title>
	<script src="./jsnes/dist/jsnes.min.js"></script>
	<script defer="defer" src="./main.js"></script>
</head>
<body>
	<div id="wrap">
		<div id="header">
			<select id="sel_rom"></select>
			<input type="button" value="换卡" id="btn1" />
			<select id="save-slot" style="min-width: 140px;"></select>
			<button id="save-btn">存档</button>
			<button id="load-btn">读档</button>
			<button id="audio-btn" style="display: none;">开启音频</button>
		</div>
		<div id="container">
			<div id="left_side">
				<div>操作：</div>
				<div>W = ↑</div>
				<div>S = ↓</div>
				<div>A = ←</div>
				<div>D = →</div>
				<div>V = 选择</div>
				<div>B = 开始</div>
				<div>J = A</div>
				<div>K = B</div>
			</div>
			<div id="screen-wrap"><canvas id="nes-canvas" width="256" height="240"></canvas></div>
			<div id="right_side">
				<div>提示：</div>
				<div>有的卡带可能加载不出来! 如果加载不出来请选择其他卡带</div>
			</div>
		</div>
		<div id="touch-controls">
			<div class="touch-cluster">
				<div class="dpad-bg"></div>
				<div class="dpad">
					<div></div>
					<button class="touch-btn" data-btn="UP">↑</button>
					<div></div>
					<button class="touch-btn" data-btn="LEFT">←</button>
					<div></div>
					<button class="touch-btn" data-btn="RIGHT">→</button>
					<div></div>
					<button class="touch-btn" data-btn="DOWN">↓</button>
					<div></div>
				</div>
			</div>
			<div class="center-buttons">
				<button class="touch-btn wide" data-btn="SELECT">SELECT</button>
				<button class="touch-btn wide" data-btn="START">START</button>
			</div>
			<div class="ab-cluster">
				<button class="touch-btn ab" data-btn="B">B</button>
				<button class="touch-btn ab" data-btn="A">A</button>
			</div>
		</div>
	</div>
</body>
</html>
